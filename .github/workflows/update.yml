name: Stand bijwerken

on:
  push:
    paths:
      - "sheets/**"
  workflow_dispatch:

permissions:
  contents: write

# nooit twee runs tegelijk; een nieuwe upload wacht netjes op de vorige
concurrency:
  group: stand-bijwerken
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Pakketten installeren
        run: pip install pandas openpyxl

      - name: Alle etappe-sheets verwerken
        run: |
          shopt -s nullglob
          bestanden=(sheets/*.xlsx)
          if [ ${#bestanden[@]} -eq 0 ]; then
            echo "Geen sheets gevonden; niets te doen."
            exit 0
          fi
          for f in "${bestanden[@]}"; do
            python update_stand.py "$f"
          done

      - name: Bijgewerkte stand committen
        run: |
          git config user.name "tourspel-bot"
          git config user.email "tourspel-bot@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "Geen wijzigingen."
            exit 0
          fi
          git commit -m "Stand bijgewerkt"
          git pull --rebase origin main
          git push
